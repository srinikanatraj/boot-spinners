<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Spinners Project</title>

  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body class="container mt-4">

  <h2 class="text-center mb-4">Bootstrap Spinners Demo</h2>

  <!-- Basic -->
  <h4>Basic Spinner</h4>
  <div class="spinner-border"></div>

  <hr>

  <!-- Colors -->
  <h4>Colored Spinners</h4>
  <div class="spinner-border text-primary"></div>
  <div class="spinner-border text-success"></div>
  <div class="spinner-border text-danger"></div>
  <div class="spinner-border text-warning"></div>

  <hr>

  <!-- Growing -->
  <h4>Growing Spinners</h4>
  <div class="spinner-grow text-primary"></div>
  <div class="spinner-grow text-success"></div>
  <div class="spinner-grow text-danger"></div>

  <hr>

  <!-- Sizes -->
  <h4>Small Spinners</h4>
  <div class="spinner-border spinner-border-sm"></div>
  <div class="spinner-grow spinner-grow-sm"></div>

  <hr>

  <!-- Alignment -->
  <h4>Centered Spinner</h4>
  <div class="d-flex justify-content-center">
    <div class="spinner-border text-info"></div>
  </div>

  <hr>

  <!-- Custom Size -->
  <h4>Custom Size</h4>
  <div class="spinner-border text-dark" style="width:3rem; height:3rem;"></div>

  <hr>

  <!-- Spinner Buttons -->
  <h4>Spinner in Button</h4>
  <button class="btn btn-primary">
    <span class="spinner-border spinner-border-sm"></span>
  </button>

  <button class="btn btn-success">
    <span class="spinner-border spinner-border-sm"></span>
    Loading...
  </button>

  <button class="btn btn-danger" disabled>
    <span class="spinner-grow spinner-grow-sm"></span>
    Processing...
  </button>

  <hr>

  <!-- Real UI Example -->
  <h4>Loading Dashboard</h4>

  <p>Fetching Data...</p>
  <div class="spinner-border text-primary"></div>

  <p class="mt-3">Uploading File...</p>
  <div class="spinner-grow text-success"></div>

</body>
</html>
